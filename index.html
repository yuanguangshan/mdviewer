<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <title>Markdown 编辑器</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
  <!-- 防 FOUC：在 body 出现前尽早按「本地偏好 → 系统主题」着色 -->
  <script>
    (function () {
      try {
        var m = localStorage.getItem('md-theme') || 'auto';
        var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = m === 'dark' || (m === 'auto' && sysDark);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        // 预览主题（独立于 app 主题）：尽早设定，避免首屏闪烁
        document.documentElement.setAttribute('data-md-theme', localStorage.getItem('md-mdtheme') || 'github');
      } catch (e) {}
    })();
  </script>
  <!-- 第三方库已本地化（vendor/），确保完全离线可用 -->
  <script src="./vendor/marked.min.js"></script>
  <script src="./vendor/highlight.min.js"></script>
  <script src="./vendor/purify.min.js"></script>
  <script src="./vendor/html2pdf.bundle.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="toolbar-left">
      <div class="brand"><svg class="brand-logo" viewBox="0 0 512 512" width="26" height="26" role="img" aria-label="mdviewer"><defs><linearGradient id="brandGrad1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient><linearGradient id="brandGrad2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#6366f1"/></linearGradient></defs><rect x="140" y="110" width="80" height="40" rx="8" fill="url(#brandGrad1)"/><rect x="292" y="110" width="80" height="40" rx="8" fill="url(#brandGrad1)"/><path d="M170 210h172c15 0 25 12 18 25l-45 80c-8 14-26 22-42 22h-58c-16 0-34-8-42-22l-45-80c-7-13 3-25 18-25z" fill="none" stroke="url(#brandGrad2)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/><circle class="brand-dot" cx="256" cy="350" r="18" fill="#e6e9ef"/></svg><span>mdviewer</span></div>
      <button id="btnLibrary" class="btn icon lib-toggle" title="文库（本地文档库）" aria-label="文库" aria-expanded="false">📚<span class="t"> 文库</span><span class="lib-count" id="libCount" hidden>0</span></button>
      </div>
      <div class="actions">
        <button id="btnNew" class="btn icon" title="新建 (Ctrl+Alt+N)" aria-label="新建文档">📄</button>
        <button id="btnOpen" class="btn icon" title="打开本地文件 (Ctrl+O)" aria-label="打开文件">📂</button>
        <button id="btnSave" class="btn primary" title="保存 / 另存为 (Ctrl+S)" aria-label="保存">💾<span class="t"> 保存</span></button>
        <span class="sep"></span>
        <button id="btnView" class="btn view" title="切换视图：双栏 / 编辑 / 预览" aria-label="切换视图">分屏</button>
        <span class="stat" id="stat" title="字数 · 预计阅读时间">0 字</span>
        <div class="menu-wrap">
          <button id="btnMore" class="btn icon" title="更多操作" aria-label="更多操作" aria-haspopup="true" aria-expanded="false">⋯</button>
          <div class="menu" id="moreMenu" role="menu" hidden>
            <button role="menuitem" data-act="rename">✏️ 重命名</button>
            <button role="menuitem" data-act="addtolib">📥 添加到文档库</button>
            <button role="menuitem" data-act="copytext">📋 复制文本</button>
            <button role="menuitem" data-act="copymd">📋 复制 Markdown</button>
            <button role="menuitem" data-act="copy">📋 复制 HTML</button>
            <div class="menu-sep"></div>
            <button role="menuitem" data-act="md">💾 导出 Markdown</button>
            <button role="menuitem" data-act="html">📄 导出 HTML</button>
            <button role="menuitem" data-act="pdf">🖨 打印为 PDF</button>
            <div class="menu-sep"></div>
            <button role="menuitem" data-act="wrap" id="menuWrap">↩️ 换行：开</button>
            <button role="menuitem" data-act="theme" id="menuTheme">🌓 主题</button>
            <div class="menu-sep"></div>
            <div class="menu-label" role="presentation">预览主题</div>
            <button role="menuitem" data-act="mdtheme" data-val="github">GitHub</button>
            <button role="menuitem" data-act="mdtheme" data-val="onedark">One Dark</button>
            <button role="menuitem" data-act="mdtheme" data-val="solarized">Solarized</button>
            <button role="menuitem" data-act="mdtheme" data-val="nord">Nord</button>
          </div>
        </div>
        <input type="file" id="fileInput" accept=".md,.markdown,.txt,text/markdown,text/plain" hidden />
      </div>
    </header>

    <main class="workspace">
      <section class="editor-pane">
        <div class="editor-wrap">
          <div class="gutter" id="gutter" aria-hidden="true"></div>
          <pre id="editorHighlight" class="editor-highlight" aria-hidden="true"></pre>
          <textarea id="editor" wrap="off" placeholder="在此输入 Markdown，右侧实时预览…&#10;支持：拖拽 / 粘贴图片、Tab 缩进、Ctrl+S 保存" spellcheck="false" aria-label="Markdown 编辑区"></textarea>
        </div>
      </section>
      <section class="preview-pane" id="previewPane">
        <div class="preview markdown-body" id="preview"></div>
      </section>
    </main>

    <footer class="statusbar">
      <span id="fileName">未命名.md</span>
      <span id="posInfo">行 1，列 1</span>
      <span id="saveState">就绪</span>
      <span class="version">v1.11.2</span>
    </footer>
    <button id="btnFullscreen" class="fs-float" title="全屏" aria-label="全屏"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 9V5a1 1 0 0 1 1-1h4M20 9V5a1 1 0 0 0-1-1h-4M4 15v4a1 1 0 0 0 1 1h4M20 15v4a1 1 0 0 1-1 1h-4"/></svg></button>
    <button id="btnExitFullscreen" class="exit-fs" hidden title="退出全屏 (Esc)" aria-label="退出全屏">✕</button>
  </div>

  <!-- 文库：左侧抽屉式本地文档库 -->
  <div class="lib-scrim" id="libScrim" hidden></div>
  <aside class="lib-drawer" id="libDrawer" aria-hidden="true" aria-label="文库">
    <div class="lib-head">
      <div class="lib-title">📚 文库</div>
      <button class="lib-close" id="libClose" title="关闭" aria-label="关闭文库">✕</button>
    </div>
    <div class="lib-tools">
      <input class="lib-search" id="libSearch" type="search" placeholder="搜索文档…" aria-label="搜索文库文档" />
      <button class="btn primary lib-new" id="libNew">＋ 新建</button>
      <button class="btn lib-upload" id="libUpload" title="上传本地文档到文库" aria-label="上传文档">⬆️ 上传</button>
    </div>
    <ul class="lib-list" id="libList"></ul>
    <div class="lib-empty" id="libEmpty" hidden>文库还是空的，点「＋ 新建」开始第一篇。</div>
  </aside>
  <input type="file" id="libFileInput" accept=".md,.markdown,.txt,text/markdown,text/plain" multiple hidden />

  <script src="./app.js"></script>
</body>
</html>
